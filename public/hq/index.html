<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Tunefield HQ</title>
<style>
  :root{--cream:#ECE6D8;--cream-warm:#F4EDE0;--teal:#11A5B3;--teal-deep:#0E2A2A;--pink:#F5B3D1;--charcoal:#1A1A1A;--slate:#6B6B7A}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--cream);color:var(--charcoal);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;line-height:1.65;-webkit-font-smoothing:antialiased}
  code,pre,.mono{font-family:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  /* Gate */
  #gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--teal-deep)}
  #gate .card{background:var(--cream);border-radius:20px;padding:40px 36px;max-width:400px;width:100%;box-shadow:0 30px 80px -30px rgba(0,0,0,.5);text-align:center}
  #gate h1{font-size:2rem;font-weight:800;letter-spacing:-.02em;margin:0 0 4px}
  #gate h1 .dot{color:var(--pink)}
  #gate p{color:var(--slate);font-size:.85rem;margin:0 0 24px;text-transform:uppercase;letter-spacing:.18em;font-family:"JetBrains Mono",monospace}
  #gate input{width:100%;padding:14px 16px;border:2px solid rgba(26,26,26,.12);border-radius:12px;font-size:1rem;margin-bottom:12px;background:#fff;color:var(--charcoal)}
  #gate input:focus{outline:none;border-color:var(--teal)}
  #gate button{width:100%;padding:14px;border:none;border-radius:12px;background:var(--teal);color:var(--cream);font-size:1rem;font-weight:600;cursor:pointer;transition:background .15s}
  #gate button:hover{background:#0e8d99}
  #gate button:disabled{opacity:.6;cursor:wait}
  #err{color:#c0392b;font-size:.85rem;margin-top:12px;min-height:1.2em}
  /* Content */
  #content{display:none;max-width:860px;margin:0 auto;padding:48px 24px 120px}
  .topbar{position:sticky;top:0;background:var(--cream);border-bottom:1px solid rgba(26,26,26,.1);padding:12px 24px;display:flex;justify-content:space-between;align-items:center;z-index:10;margin:-48px -24px 32px}
  .topbar .brand{font-weight:800;letter-spacing:-.02em}
  .topbar .brand .dot{color:var(--pink)}
  .topbar button{background:none;border:1px solid rgba(26,26,26,.2);border-radius:8px;padding:6px 12px;font-size:.8rem;cursor:pointer;color:var(--slate)}
  .wb h1{font-size:2.4rem;font-weight:800;letter-spacing:-.03em;line-height:1.1;margin:.6em 0 .3em}
  .wb h2{font-size:1.7rem;font-weight:700;letter-spacing:-.02em;margin:1.6em 0 .5em;padding-top:.6em;border-top:2px solid var(--teal);color:var(--teal-deep)}
  .wb h3{font-size:1.25rem;font-weight:700;margin:1.4em 0 .4em;color:var(--charcoal)}
  .wb h4{font-size:1.02rem;font-weight:700;margin:1.3em 0 .3em;color:var(--teal)}
  .wb p{margin:.7em 0;max-width:68ch}
  .wb a{color:var(--teal);text-decoration:underline}
  .wb ul,.wb ol{max-width:68ch;padding-left:1.4em}
  .wb li{margin:.3em 0}
  .wb blockquote{border-left:3px solid var(--pink);background:var(--cream-warm);margin:1em 0;padding:.6em 1.2em;border-radius:0 8px 8px 0;color:var(--charcoal)}
  .wb hr{border:none;border-top:1px solid rgba(26,26,26,.15);margin:2em 0}
  .wb table{border-collapse:collapse;width:100%;margin:1em 0;font-size:.88rem;display:block;overflow-x:auto}
  .wb th,.wb td{border:1px solid rgba(26,26,26,.15);padding:8px 10px;text-align:left;vertical-align:top}
  .wb th{background:var(--teal-deep);color:var(--cream);font-weight:600}
  .wb tr:nth-child(even) td{background:var(--cream-warm)}
  .wb code{background:rgba(17,165,179,.12);padding:.1em .35em;border-radius:4px;font-size:.85em}
  .wb pre{background:var(--teal-deep);color:var(--cream);padding:16px;border-radius:10px;overflow-x:auto}
  .wb pre code{background:none;padding:0;color:inherit}
  .wb strong{font-weight:700}
</style>
</head>
<body>
<div id="gate">
  <div class="card">
    <h1>tunefield<span class="dot">.</span></h1>
    <p>HQ · private</p>
    <form id="f">
      <input id="pw" type="password" placeholder="Password" autocomplete="current-password" autofocus>
      <button id="btn" type="submit">Unlock</button>
    </form>
    <div id="err"></div>
  </div>
</div>
<div id="content"></div>

const b64d = (s) => Uint8Array.from(atob(s), c => c.charCodeAt(0));
document.getElementById('f').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('btn'), err = document.getElementById('err');
  const pw = document.getElementById('pw').value;
  btn.disabled = true; btn.textContent = 'Unlocking…'; err.textContent = '';
  try {
    const encT = new TextEncoder();
    const baseKey = await crypto.subtle.importKey('raw', encT.encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name:'PBKDF2', salt:b64d(ENC.s), iterations:ENC.n, hash:'SHA-256' },
      baseKey, { name:'AES-GCM', length:256 }, false, ['decrypt']);
    const plain = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64d(ENC.i) }, key, b64d(ENC.d));
    const htmlText = new TextDecoder().decode(plain);
    const c = document.getElementById('content');
    c.innerHTML = '<div class="topbar"><span class="brand">tunefield<span class="dot">.</span> HQ</span><button onclick="location.reload()">Lock</button></div>' + htmlText;
    document.getElementById('gate').style.display = 'none';
    c.style.display = 'block';
    window.scrollTo(0,0);
  } catch (_) {
    err.textContent = 'Wrong password.';
    btn.disabled = false; btn.textContent = 'Unlock';
    document.getElementById('pw').select();
  }
});
